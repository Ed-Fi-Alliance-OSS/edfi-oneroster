# This docker compose is only intended for local testing of the dockerfiles in
# the parent docker/ directory. Those files load the Ed-Fi components from
# publisehd NuGet packages rather than from source code.

services:
  db-ods:
    build:
      context: ./db-ods
      dockerfile: Dockerfile
      args:
        ODS_POPULATED_VERSION: ${MSSQL_ODS_POPULATED_VERSION}
        TPDM_POPULATED_VERSION: ${MSSQL_TPDM_POPULATED_VERSION}
        ODS_MINIMAL_VERSION: ${MSSQL_ODS_MINIMAL_VERSION}
        TPDM_MINIMAL_VERSION: ${MSSQL_TPDM_MINIMAL_VERSION}
        STANDARD_VERSION: ${STANDARD_VERSION}
        EXTENSION_VERSION: ${EXTENSION_VERSION}
    environment:
      SQLSERVER_USER: ${SQLSERVER_USER}
      SQLSERVER_PASSWORD: ${SQLSERVER_PASSWORD}
      TPDM_ENABLED: ${TPDM_ENABLED:-true}
      MSSQL_PID: ${MSSQL_PID:-Express}
    volumes:
      - vol-db-ods:/var/opt/mssql/data
      - vol-db-ods-logs:/var/opt/mssql/log
    restart: always
    container_name: ed-fi-db-ods
    hostname: ed-fi-db-ods
    networks:
      - edfioneroster-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -C -U ${SQLSERVER_USER} -P "${SQLSERVER_PASSWORD}" -Q "SELECT 1"
      start_period: "60s"
      retries: 3

  db-admin:
    build:
      context: ./db-admin
      dockerfile: Dockerfile
      args:
        ADMIN_VERSION: ${MSSQL_ADMIN_VERSION}
        SECURITY_VERSION: ${MSSQL_SECURITY_VERSION}
        STANDARD_VERSION: ${STANDARD_VERSION}
    environment:
      SQLSERVER_USER: ${SQLSERVER_USER}
      SQLSERVER_PASSWORD: ${SQLSERVER_PASSWORD}
      MSSQL_PID: ${MSSQL_PID:-Express}
    volumes:
      - vol-db-admin:/var/opt/mssql/data
      - vol-db-admin-logs:/var/opt/mssql/log
    restart: always
    container_name: ed-fi-db-admin
    hostname: ed-fi-db-admin
    networks:
      - edfioneroster-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -C -U ${SQLSERVER_USER} -P "${SQLSERVER_PASSWORD}" -Q "SELECT 1"
      start_period: "60s"
      retries: 3

  ods-api:
    build:
      context: ./ods-api
      dockerfile: Dockerfile
      args:
        API_VERSION: ${API_VERSION}
        STANDARD_VERSION: ${STANDARD_VERSION}
    environment:

      SQLSERVER_USER: ${SQLSERVER_USER}
      SQLSERVER_PASSWORD: ${SQLSERVER_PASSWORD}
      SQLSERVER_ODS_DATASOURCE: ed-fi-db-ods
      SQLSERVER_ADMIN_DATASOURCE: ed-fi-db-admin
      PATH_BASE: '${ODS_API_VIRTUAL_NAME}'
      TPDM_ENABLED: ${TPDM_ENABLED:-true}
      API_HEALTHCHECK_TEST: ${ODS_API_HEALTHCHECK}
      ODS_CONNECTION_STRING_ENCRYPTION_KEY: ${ODS_CONNECTION_STRING_ENCRYPTION_KEY}
      ASPNETCORE_ENVIRONMENT: 'docker'
      FeatureManagement__MultiTenancy: false
      FeatureManagement__OneRoster: true
      ApiSettings__OneRosterVersionUrl: '${BASE_URL}/${ONEROSTER_API_VIRTUAL_NAME:-oneroster-api}'
      Security__AccessTokenType: 'jwt'
      Security__Jwt__Issuer: '${BASE_URL}/${ODS_API_VIRTUAL_NAME:-api}'

      Security__Jwt__SigningKey__PrivateKey: '${SECURITY__JWT__PRIVATEKEY}'
      Security__Jwt__SigningKey__PublicKey: '${SECURITY__JWT__PUBLICKEY}'

      Security__Jwt__Audiences__0: '${BASE_URL}/${ODS_API_VIRTUAL_NAME:-api}'
      Security__Jwt__Audiences__1: '${BASE_URL}/${ONEROSTER_API_VIRTUAL_NAME:-oneroster-api}'
    volumes:
      - ${LOGS_FOLDER}:/app/logs
    ports:
      - 8001:80
    depends_on:
      - db-ods
      - db-admin
    restart: always
    container_name: ed-fi-ods-api
    hostname: ed-fi-ods-api
    networks:
      - edfioneroster-network
    healthcheck:
      test: ${API_HEALTHCHECK_TEST}
      start_period: "60s"
      retries: 3

  swagger:
    image: edfialliance/ods-api-swaggerui:${SWAGGER_TAG_7X}
    environment:
      SAMPLE_KEY: "${POPULATED_KEY}"
      SAMPLE_SECRET: "${POPULATED_SECRET}"
      WebApiVersionUrl: "${BASE_URL}/${ODS_API_VIRTUAL_NAME:-api}/"
      PathBase: "${DOCS_VIRTUAL_NAME:-swagger}"
      SWAGGER_HEALTHCHECK_TEST: ${SWAGGER_HEALTHCHECK_TEST?Please consult env.example to set the SWAGGER healthcheck test}
    depends_on:
      - ods-api
      - db-ods
      - db-admin
    restart: always
    hostname: ${DOCS_VIRTUAL_NAME}
    container_name: ed-fi-swagger
    healthcheck:
      test: $$SWAGGER_HEALTHCHECK_TEST
      start_period: "60s"
      retries: 3
    networks:
      - edfioneroster-network

volumes:
  vol-db-admin:
    driver: local
    name: vol-db-admin
  vol-db-ods:
    driver: local
    name: vol-db-ods
  vol-db-ods-logs:
    driver: local
    name: vol-db-ods-logs
  vol-db-admin-logs:
    driver: local
    name: vol-db-admin-logs

networks:
  edfioneroster-network:
    external: true
