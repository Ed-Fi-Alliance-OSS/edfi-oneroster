name: On Pre-Release
on:
  release:
    types:
      - prereleased

env:
  API_IMAGE_NAME: ${{ vars.API_IMAGE_NAME }}
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
  REF: ${{ github.ref_name }}

permissions: read-all

jobs:
  docker-publish:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
           ref: ${{ github.ref }}
           fetch-depth: 0

      - name: Prepare Tags
        id: prepare-tags
        run: |
          REF="${{ env.REF }}"
          if [[ $REF =~ "Pre-Release" ]]
          then
             # Remove Pre-Release prefix
             PREFIX="Pre-Release-"
             PACKAGEVERSION=${REF#"$PREFIX"}
          else
             PACKAGEVERSION=${REF}
          fi

          if [[ $PACKAGEVERSION =~ "alpha" ]]
          then
            # Pre-releases get the tag "pre"
            APITAGS="${{ env.API_IMAGE_NAME }}:pre"
          else
            # Releases get the version, plus shortened form for minor release.
            # We are not using shortened form for major or using "latest"
            # because they are too imprecise.
            MINOR=`echo ${PACKAGEVERSION} | awk -F"." '{print $1"."$2}'`
            APITAGS="${{ env.API_IMAGE_NAME }}:${PACKAGEVERSION},${{ env.API_IMAGE_NAME }}:${MINOR}"
          fi

          echo "APITAGS=$APITAGS" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_HUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5  # v3.8.0

      - name: Extract metadata (tags, labels) for one-roster api image
        id: metaapi
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96  # v5.6.1
        with:
          images: ${{ env.API_IMAGE_NAME }}

      - name: Build and push one-roster api image
        uses: docker/build-push-action@b32b51a8eda65d6793cd0494a773d4f6bcef32dc  # v6.11.0
        with:
          context: "{{defaultContext}}:./"
          cache-from: type=registry,ref=${{ env.API_IMAGE_NAME }}:pre
          cache-to: type=inline
          platforms: linux/amd64,linux/arm64
          file: Dockerfile
          tags: ${{ steps.prepare-tags.outputs.APITAGS }}
          labels: ${{ steps.metaapi.outputs.labels }}
          push: true
