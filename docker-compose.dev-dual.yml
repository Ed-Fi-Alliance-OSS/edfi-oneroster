#
# Dual-database dev compose file: runs two API instances simultaneously —
# one for PostgreSQL (port 3000) and one for MSSQL (port 3001) — to test
# both backends side by side.
#
# Requires an existing external 'pgsql_default' Docker network and separately
# running Postgres and MSSQL instances. Reads credentials from .env.postgres
# and .env.mssql in the repo root.
#
# Usage (from repo root):
#   docker compose -f docker-compose.dev-dual.yml up --build
#
# Or use the helper script: ./deploy-dual.sh

services:
  # PostgreSQL API instance on port 3000
  api-postgres:
    build: .
    user: appuser
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    container_name: edfi-oneroster-postgres
    ports:
      - "3000:3000"
    networks:
      - pgsql_default
    env_file:
      - .env.postgres
    environment:
      - CONTAINER_NAME=PostgreSQL
    healthcheck:
      test: ${ONEROSTER_API_HEALTHCHECK_TEST:-if [ "$${ENABLE_HTTPS}" = "true" ]; then curl -fk https://localhost:3000/health-check; else curl -f http://localhost:3000/health-check; fi}
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MSSQL API instance on port 3001
  api-mssql:
    build: .
    user: appuser
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    container_name: edfi-oneroster-mssql
    ports:
      - "3001:3001"
    networks:
      - pgsql_default
    env_file:
      - .env.mssql
    environment:
      - CONTAINER_NAME=MSSQL
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  pgsql_default:
    external: true
