# This compose file defines the Ed-Fi ODS / API services required by the
# Ed-Fi One Roster for local development and testing.

services:
  db-ods:
    image: edfialliance/${ODS_DB_IMAGE_7X}:${ODS_DB_TAG_7X}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TPDM_ENABLED: '${TPDM_ENABLED:-true}'
    restart: always
    volumes:
      - vol-db-ods:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready  -U ${POSTGRES_USER}']
      start_period: 30s
      retries: 30
      interval: 30s
    networks:
      - edfioneroster-network

  db-admin:
    image: edfialliance/ods-api-db-admin:${ADMIN_DB_TAG_7X}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ODS_PGBOUNCER_PORT: 5432
      ODS_POSTGRES_HOST: db-ods
      NPG_POOLING_ENABLED: '${NPG_POOLING_ENABLED:-true}'
      NPG_API_MAX_POOL_SIZE_ODS: '${NPG_API_MAX_POOL_SIZE_ODS:-20}'
    volumes:
      - vol-db-admin:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready  -U ${POSTGRES_USER}']
      start_period: 30s
      retries: 30
      interval: 30s
    networks:
      - edfioneroster-network

  v7-single-api:
    image: edfialliance/ods-api-web-api:${ODS_API_TAG_7X}
    environment:
      ADMIN_POSTGRES_HOST: db-admin
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: 5432
      PATH_BASE: '${V7_SINGLE_API_VIRTUAL_NAME}'
      TPDM_ENABLED: '${TPDM_ENABLED:-true}'
      ODS_WAIT_POSTGRES_HOSTS: 'db-ods'
      NPG_POOLING_ENABLED: '${NPG_POOLING_ENABLED:-true}'
      NPG_API_MAX_POOL_SIZE_ODS: '${NPG_API_MAX_POOL_SIZE_ODS:-20}'
      NPG_API_MAX_POOL_SIZE_ADMIN: '${NPG_API_MAX_POOL_SIZE_ADMIN:-20}'
      NPG_API_MAX_POOL_SIZE_SECURITY: '${NPG_API_MAX_POOL_SIZE_SECURITY:-20}'
      NPG_API_MAX_POOL_SIZE_MASTER: '${NPG_API_MAX_POOL_SIZE_MASTER:-20}'
      ODS_CONNECTION_STRING_ENCRYPTION_KEY: '${ODS_CONNECTION_STRING_ENCRYPTION_KEY}'
      ASPNETCORE_ENVIRONMENT: 'docker'
      FeatureManagement__MultiTenancy: false
      FeatureManagement__OneRoster: true
      ApiSettings__OneRosterVersionUrl: 'https://localhost/oneroster-api'
      Security__AccessTokenType: 'jwt'
      Security__Jwt__Issuer: 'https://localhost/${V7_SINGLE_API_VIRTUAL_NAME:-api}'

