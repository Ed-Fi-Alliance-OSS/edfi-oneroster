    volumes:
      - ${LOGS_FOLDER}:/app/logs
    depends_on:
      - db-ods
      - db-admin
    restart: always
    hostname: ${V7_SINGLE_API_VIRTUAL_NAME}
    healthcheck:
      test: ${V7_SINGLE_API_HEALTHCHECK}
      start_period: 30s
      retries: 30
      interval: 30s
    networks:
      - edfioneroster-network

  admin:
    image: edfialliance/ods-api-web-sandbox-admin:${SANDBOX_ADMIN_API_TAG_7X}
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_PORT: 5432
      ADMIN_USER: "${ADMIN_USER}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      MINIMAL_KEY: "${MINIMAL_KEY}"
      MINIMAL_SECRET: "${MINIMAL_SECRET}"
      POPULATED_KEY: "${POPULATED_KEY}"
      POPULATED_SECRET: "${POPULATED_SECRET}"
      ODS_POSTGRES_HOST: db-ods
      ADMIN_POSTGRES_HOST: db-admin
      PathBase: "${SANDBOX_ADMIN_VIRTUAL_NAME:-admin}"
      OAuthUrl: "https://localhost/${V7_SINGLE_API_VIRTUAL_NAME:-api}/oauth/"
      SANDBOX_HEALTHCHECK_TEST: ${SANDBOX_HEALTHCHECK_TEST?Please consult env.example to set the API healthcheck test}
      NPG_POOLING_ENABLED: "${NPG_POOLING_ENABLED:-false}"
      NPG_SANDBOX_MAX_POOL_SIZE_ODS: "${NPG_SANDBOX_MAX_POOL_SIZE_ODS}"
      NPG_SANDBOX_MAX_POOL_SIZE_ADMIN: "${NPG_SANDBOX_MAX_POOL_SIZE_ADMIN}"
      NPG_SANDBOX_MAX_POOL_SIZE_SECURITY: "${NPG_SANDBOX_MAX_POOL_SIZE_SECURITY}"
      NPG_SANDBOX_MAX_POOL_SIZE_MASTER: "${NPG_SANDBOX_MAX_POOL_SIZE_MASTER}"
    volumes:
      - ${LOGS_FOLDER}:/app/logs
    depends_on:
      - db-ods
      - db-admin
    restart: always
    hostname: admin
    container_name: ed-fi-sandbox-admin
    healthcheck:
      test: $$SANDBOX_HEALTHCHECK_TEST
      start_period: "60s"
      retries: 3
    networks:
      - edfioneroster-network

  swagger:
    image: edfialliance/ods-api-swaggerui:${SWAGGER_TAG_7X}
    environment:
      SAMPLE_KEY: "${POPULATED_KEY}"
      SAMPLE_SECRET: "${POPULATED_SECRET}"
      WebApiVersionUrl: "https://localhost/${V7_SINGLE_API_VIRTUAL_NAME:-api}/"
      PathBase: "${DOCS_VIRTUAL_NAME:-docs}"
      SWAGGER_HEALTHCHECK_TEST: ${SWAGGER_HEALTHCHECK_TEST?Please consult env.example to set the SWAGGER healthcheck test}
    depends_on:
      - v7-single-api
      - admin
      - db-ods
      - db-admin
    restart: always
    hostname: swagger
    container_name: ed-fi-swagger
    healthcheck:
      test: $$SWAGGER_HEALTHCHECK_TEST
      start_period: "60s"
      retries: 3
    networks:
      - edfioneroster-network


  pgadmin4:
    image: dpage/pgadmin4:9.5.0@sha256:2a830466aafd9cbc2aea0f76ff81a80dbbba819f2f5db7e69cb40e9cbdb6bc7b
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '127.0.0.1:5050:80'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./settings/pgadmin-servers.json:/pgadmin4/servers.json
    restart: always
    networks:
      - edfioneroster-network

networks:
  edfioneroster-network:
    external: true

volumes:
  vol-db-ods:
    driver: local
    name: vol-db-ods
  vol-db-admin:
    driver: local
    name: vol-db-admin
  pgadmin-data:
    driver: local
    name: pgadmin-data
