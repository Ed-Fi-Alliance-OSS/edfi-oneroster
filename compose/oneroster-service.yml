# This compose file defines the supporting services, Ed-Fi OneRoster API.
# It is intended to be used in conjunction with the base edfi-services.yml file

services:
  # PostgreSQL API instance on port 3000
  oneroster-api:
    build: ../
    container_name: edfi-oneroster
    ports:
      - "3000:3000"
    networks:
      - edfioneroster-network
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  edfioneroster-network:
    external: true
    name: edfioneroster-network
